<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes réservations — FabLab Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo"><span class="dot"></span> FabLab Manager</div>
    <div class="role-tag">Espace client</div>
    <a class="nav-item" href="client.html"><span class="ic">⌂</span> Accueil</a>
    <a class="nav-item" href="magasins.html"><span class="ic">⬚</span> Magasins</a>
    <a class="nav-item active" href="reservations.html"><span class="ic">▤</span> Mes réservations</a>
    <a class="nav-item" href="profil.html"><span class="ic">⚙</span> Profil</a>
    <div class="spacer"></div>
    <div class="user-card">
      <div class="avatar" id="user-initials">--</div>
      <div><span id="user-name">Chargement...</span><br><span style="opacity:.7;font-size:11.5px;">Client</span></div>
    </div>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
    <div class="mtopbar">
      <div class="logo"><span class="dot"></span> FabLab Manager</div>
      <div class="avatar" id="user-initials-mobile" style="background:var(--rose-soft);">--</div>
    </div>

    <div class="main">
      <div class="page-header">
        <div>
          <h1>Mes réservations</h1>
          <div class="sub">Réservation en cours et historique complet</div>
        </div>
        <a href="commande.html" class="btn btn-primary">+ Passer commande</a>
      </div>

      <!-- Réservation active -->
      <div id="active-resa-zone" style="margin-bottom:24px;">
        <div class="empty-state card"><div class="ic">📦</div>Chargement...</div>
      </div>

      <!-- Historique complet -->
      <div class="section-title">Historique</div>
      <div class="card" id="history-zone">
        <div class="empty-state"><div class="ic">▤</div>Chargement de l'historique...</div>
      </div>
    </div>

    <div class="mbottombar">
      <a class="mtab" href="client.html"><span class="ic">⌂</span>Accueil</a>
      <a class="mtab" href="magasins.html"><span class="ic">⬚</span>Magasins</a>
      <a class="mtab active" href="reservations.html"><span class="ic">▤</span>Réservé</a>
      <a class="mtab" href="profil.html"><span class="ic">⚙</span>Profil</a>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/session.js"></script>
<script src="../js/reservations.js"></script>
</body>
</html>
