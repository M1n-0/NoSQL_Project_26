
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — FabLab Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo">✦ FabLab Manager</div>
    <div class="tag">Connectez-vous avec les identifiants fournis par votre administrateur</div>

    <form id="login-form">
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" required>
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary">Se connecter</button>
      <div class="error-msg" id="error-msg">Identifiants incorrects.</div>
    </form>

    <div class="hint">Mot de passe oublié ? Contactez votre administrateur.</div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  const form = document.getElementById("login-form");
  const errorMsg = document.getElementById("error-msg");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.style.display = "none";

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const { token, role } = await api.login(email, password);
      localStorage.setItem("fablab_token", token);
      localStorage.setItem("fablab_role", role);

      if (role === "admin") {
        window.location.href = "admin.html";
      } else if (role === "commercant") {
        window.location.href = "commercant.html";
      } else {
        window.location.href = "client.html";
      }
    } catch (err) {
      errorMsg.textContent = err.message || "Identifiants incorrects.";
      errorMsg.style.display = "block";
    }
  });
</script>

</body>
</html>
