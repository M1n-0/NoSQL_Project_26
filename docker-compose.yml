# FabLab Manager — infrastructure de persistance polyglotte + API
# 4 bases : MariaDB (SQL), MongoDB (document), Redis (clé-valeur), Neo4j (graphe)

services:

  # API — serveur Node/Express  
  backend:
    build: ./backend
    container_name: fablab-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      JWT_SECRET: changeme

      SQL_HOST: mariadb
      SQL_PORT: 3306
      SQL_USER: fablab_app
      SQL_PASSWORD: fablab_app_pass
      SQL_DATABASE: fablab

      MONGO_URI: mongodb://root:rootpass@mongo:27017/?authSource=admin
      MONGO_DATABASE: fablab

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: fablab_redis_pass

      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: fablab_neo4j_pass
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/frontend:ro
    depends_on:
      mariadb:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - fablab-net

  # SQL — comptes, magasins, machines, réservations (intégrité forte)
  mariadb:
    image: mariadb:11
    container_name: fablab-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: fablab
      MARIADB_USER: fablab_app
      MARIADB_PASSWORD: fablab_app_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./backend/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fablab-net

  # MongoDB — fiches machines/magasins enrichies (schéma variable)
  mongo:
    image: mongo:8
    container_name: fablab-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
      MONGO_INITDB_DATABASE: fablab
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      # scripts .js exécutés automatiquement au premier démarrage
      - ./backend/mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fablab-net

 
  # Redis — statuts temps réel, TTL réservations, compteurs, sessions
  redis:
    image: redis:8
    container_name: fablab-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "fablab_redis_pass"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "fablab_redis_pass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fablab-net

  # Conteneur "jetable" qui exécute le seed Redis puis s'arrête
  redis-seed:
    image: redis:8
    container_name: fablab-redis-seed
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/redis:/seed:ro
    entrypoint: ["sh", "/seed/seed.sh"]
    networks:
      - fablab-net
    restart: "no"


  # Neo4j — habilitations, réseau de fréquentation, recommandations
  neo4j:
    image: neo4j:2026.05-community
    container_name: fablab-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/fablab_neo4j_pass
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 256M
      NEO4J_server_memory_heap_max__size: 512M
    ports:
      - "7474:7474"
      - "7687:7687" 
    volumes:
      - neo4j_data:/data
      - ./backend/neo4j/init:/init:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - fablab-net

  # Conteneur "jetable" qui injecte le graphe de seed via cypher-shell
  neo4j-seed:
    image: neo4j:2026.05-community
    container_name: fablab-neo4j-seed
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend/neo4j/init:/init:ro
    entrypoint: >
      sh -c "cypher-shell -a bolt://neo4j:7687 -u neo4j -p fablab_neo4j_pass -f /init/seed.cypher"
    networks:
      - fablab-net
    restart: "no"

networks:
  fablab-net:
    driver: bridge

volumes:
  mariadb_data:
  mongo_data:
  redis_data:
  neo4j_data:
