<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon magasin — FabLab Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo"><span class="dot"></span> FabLab Manager</div>
    <div class="role-tag">Espace commerçant</div>
    <a class="nav-item" href="commercant.html"><span class="ic">⌂</span> Accueil</a>
    <a class="nav-item active" href="commercant.html"><span class="ic">⬚</span> Mon magasin</a>
    <a class="nav-item" href="commercant-historique.html"><span class="ic">▤</span> Historique</a>
    <a class="nav-item" href="commercant-profil.html"><span class="ic">⚙</span> Paramètres</a>
    <div class="spacer"></div>
    <div class="user-card">
      <div class="avatar" id="shop-initials">--</div>
      <div><span id="shop-name-sidebar">Chargement...</span><br><span style="opacity:.7;font-size:11.5px;">Commerçant</span></div>
    </div>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
    <div class="mtopbar">
      <div class="logo"><span class="dot"></span> FabLab Manager</div>
      <div class="avatar" id="shop-initials-mobile" style="background:var(--rose-soft);">--</div>
    </div>

    <div class="main">
      <div class="page-header">
        <div>
          <h1>Mon magasin</h1>
          <div class="sub" id="shop-subtitle">Chargement...</div>
        </div>
        <button class="btn btn-soft" id="btn-add-machine">+ Ajouter une machine</button>
      </div>

      <div class="grid">
        <div class="card">
          <div class="section-title">Occupation en temps réel</div>
          <!-- TODO (backend) : GET /api/shops/me/occupancy -->
          <div id="occupancy-zone">
            <div class="empty-state"><div class="ic">⬚</div>Chargement...</div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">Paramètres rapides</div>
          <form id="shop-settings-form">
            <div class="field"><label>Capacité maximale</label><input id="setting-capacity" value=""></div>
            <div class="field"><label>Horaires</label><input id="setting-hours" value=""></div>
            <div class="field" style="margin-bottom:10px;"><label>Contact</label><input id="setting-contact" value=""></div>
            <button type="submit" class="btn btn-soft btn-sm">Enregistrer</button>
          </form>
        </div>
      </div>

      <div class="section-title">Machines</div>
      <!-- TODO (backend) : GET /api/machines/me -->
      <div id="machines-zone">
        <div class="empty-state card"><div class="ic">🔧</div>Chargement des machines...</div>
      </div>
    </div>

    <div class="mbottombar">
      <a class="mtab" href="#"><span class="ic">⌂</span>Accueil</a>
      <a class="mtab active" href="commercant.html"><span class="ic">⬚</span>Magasin</a>
      <a class="mtab" href="commercant-historique.html"><span class="ic">▤</span>Historique</a>
      <a class="mtab" href="commercant-profil.html"><span class="ic">⚙</span>Réglages</a>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/commercant.js"></script>
</body>
</html>
